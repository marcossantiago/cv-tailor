name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy-worker:
    name: Deploy Cloudflare Worker
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      worker_url: ${{ steps.deploy.outputs.deployment-url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy with Wrangler
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: worker

      - name: Write worker URL to config.js
        run: |
          cat > config.js <<EOF
          // Auto-generated by the Cloudflare Worker deploy job.
          // Do not edit manually — changes will be overwritten on next deploy.
          const CONFIG = {
            workerUrl: "${{ steps.deploy.outputs.deployment-url }}",
          };
          EOF

      - name: Commit config.js
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add config.js
          git diff --cached --quiet || git commit -m "chore: update worker URL in config.js [skip ci]"
          git push

  deploy-pages:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: deploy-worker
    permissions:
      contents: read
      pages: write
      id-token: write
    concurrency:
      group: pages
      cancel-in-progress: true
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Pull the latest commit (which includes the config.js update from deploy-worker)
          ref: main

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
